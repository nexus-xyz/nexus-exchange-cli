# Cloudflare Worker that serves the nexus installer at https://cli.nexus.xyz.
# Deploy with `wrangler deploy` (see README.md in this directory).

name = "nexus-cli-installer"
main = "src/installer.mjs"
compatibility_date = "2025-05-05"

# DNS + route binding for cli.nexus.xyz are owned by TERRAFORM, not Wrangler.
# Convention (EDR-003 / ENG-3922): Terraform owns DNS, Wrangler owns script
# uploads. So this config intentionally declares NO `routes` and does NOT use
# `custom_domain` — `wrangler deploy` only uploads the Worker script. Traffic is
# bound to cli.nexus.xyz by a `cloudflare_workers_route` in the monorepo
# Terraform (workers/ workspace), which also owns the CNAME record.
#
# This previously set `routes = [{ pattern = "cli.nexus.xyz", custom_domain =
# true }]`, which made Wrangler claim the DNS+TLS and conflicted with the
# Terraform-managed record (ENG-3922, nexus#2270). Do NOT re-add custom_domain.

# Pinned upstream coordinates. These are the defaults baked into the Worker; we
# set them explicitly here so the source of truth for "which repo/app do we
# install" is reviewable config. The Worker validates them against a strict
# charset before ever building a URL.
[vars]
INSTALLER_OWNER = "nexus-xyz"
INSTALLER_REPO  = "nexus-exchange-cli"
INSTALLER_APP   = "nexus-exchange-cli"

[observability]
enabled = true
