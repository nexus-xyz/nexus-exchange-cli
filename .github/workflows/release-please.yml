# release-please — version + changelog automation (ENG-3921).
#
# Watches `main` and, from Conventional Commit messages, maintains a standing
# "release PR" that bumps `version` in Cargo.toml + Cargo.lock and writes
# CHANGELOG.md. Semver follows commit type: feat -> minor, fix -> patch,
# feat!/BREAKING CHANGE -> major. Merging the release PR creates the `v<version>`
# tag, which in turn fires the existing signed `release.yml` (cargo-dist build ->
# minisign -> upload -> Homebrew).
#
# This is COMPLEMENTARY to the cargo-dist pipeline (see EDR-003). release-please
# only edits Cargo.toml / Cargo.lock / CHANGELOG.md / the manifest — it never
# touches `release.yml`, which is generated by `dist generate` and asserted by
# CI (`dist generate --check`). The two concerns stay separate by design.
#
# Mirrors the release-please setup used for eng/infra/terraform/modules.
name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # A PAT (or GitHub App token), NOT the default GITHUB_TOKEN. Merging the
          # release PR creates the `v<version>` tag, and the existing `release.yml`
          # is triggered by `on: push: tags`. GitHub deliberately does NOT fire
          # further workflows for events created by the built-in GITHUB_TOKEN, so
          # the tag must be pushed under a separate token for the cargo-dist
          # release to run. Scope: contents:write + pull-requests:write on this
          # repo. See README "Cutting a release".
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
