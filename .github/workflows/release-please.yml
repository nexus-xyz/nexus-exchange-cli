# release-please — version + changelog automation (ENG-3921).
#
# Watches `main` and, from Conventional Commit messages, maintains a standing
# "release PR" that bumps `version` in Cargo.toml + Cargo.lock and writes
# CHANGELOG.md. Semver follows commit type: feat -> minor, fix -> patch,
# feat!/BREAKING CHANGE -> major. Merging the release PR creates the `v<version>`
# tag AND a *draft* GitHub Release (`"draft": true` in release-please-config.json),
# which in turn fires the existing signed `release.yml` (cargo-dist build ->
# minisign -> upload -> Homebrew). dist runs with `create-release = false`, so it
# uploads its artifacts INTO that draft Release and undrafts it — it never creates
# its own Release, so there is no `gh release create` collision on the tag.
#
# This is COMPLEMENTARY to the cargo-dist pipeline (see EDR-003). release-please
# only edits Cargo.toml / Cargo.lock / CHANGELOG.md / the manifest — it never
# touches `release.yml`, which is generated by `dist generate` and asserted by
# CI (`dist generate --check`). The two concerns stay separate by design.
#
# Mirrors the release-please setup used for eng/infra/terraform/modules.
name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Mint a short-lived token from the org release GitHub App (nexus-release-bot)
      # so release PRs, the release commit, and the tag are authored by the App —
      # not a personal account (ENG-4354). Like a PAT, and unlike the built-in
      # GITHUB_TOKEN, an App-installation token CAN trigger the downstream
      # tag-listening release.yml.
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # App-installation token from the app-token step above, NOT the default
          # GITHUB_TOKEN. The tag is pushed in the next step under this token (see
          # there); the built-in GITHUB_TOKEN cannot trigger the downstream
          # tag-listening release.yml. App scope: contents:write +
          # pull-requests:write on this repo. See README "Cutting a release".
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Create the git tag ourselves when a release is cut. release-please makes a
      # *draft* GitHub Release ("draft": true), and GitHub does NOT materialise the
      # underlying git tag for a draft Release until it is published — so the
      # tag-listening release.yml (on: push: tags) would never fire and the
      # cargo-dist build/sign/upload-into-draft/undraft handoff would stall.
      # Pushing the tag under the App-installation token (which, like a PAT and
      # unlike GITHUB_TOKEN, triggers other workflows) both supplies the missing
      # ref and triggers release.yml. Idempotent: tolerate an already-existing ref
      # so re-runs are safe.
      - name: Create release tag (draft Releases don't create the git tag)
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ steps.release.outputs.tag_name }}
          SHA: ${{ steps.release.outputs.sha }}
        run: |
          set -euo pipefail
          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG" >/dev/null 2>&1; then
            echo "tag $TAG already exists; nothing to do"
          else
            gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
              -f "ref=refs/tags/$TAG" -f "sha=$SHA"
            echo "created tag $TAG at $SHA -> release.yml will now run"
          fi
