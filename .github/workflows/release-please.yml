# release-please — version + changelog automation (ENG-3921).
#
# Watches `main` and, from Conventional Commit messages, maintains a standing
# "release PR" that bumps `version` in Cargo.toml + Cargo.lock and writes
# CHANGELOG.md. Semver follows commit type: feat -> minor, fix -> patch,
# feat!/BREAKING CHANGE -> major. Merging the release PR creates the `v<version>`
# tag AND a *draft* GitHub Release (`"draft": true` in release-please-config.json),
# which in turn fires the existing signed `release.yml` (cargo-dist build ->
# minisign -> upload -> Homebrew). dist runs with `create-release = false`, so it
# uploads its artifacts INTO that draft Release and undrafts it — it never creates
# its own Release, so there is no `gh release create` collision on the tag.
#
# This is COMPLEMENTARY to the cargo-dist pipeline (see EDR-003). release-please
# only edits Cargo.toml / Cargo.lock / CHANGELOG.md / the manifest — it never
# touches `release.yml`, which is generated by `dist generate` and asserted by
# CI (`dist generate --check`). The two concerns stay separate by design.
#
# Mirrors the release-please setup used for eng/infra/terraform/modules.
name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
