name: Spec drift

# Verifies the spec operations the CLI's commands exercise (endpoints.txt) all
# still exist in the pinned OpenAPI spec (.api-version), that the commands and
# endpoints.txt stay in sync (every entry is backed by a real `client.<method>()`
# call, and vice versa, modulo the documented allowlists), and reports the CLI's
# API coverage % — the number the dashboard's CLI panel reads. Mirrors the same
# workflow in the Rust SDK (nexus-exchange-rs). Fetches the spec from the
# raw-at-tag URL and caches it by the pinned version so a normal run does no
# network.

on:
  pull_request:
    paths:
      - '.api-version'
      - 'endpoints.txt'
      - 'scripts/check_spec_drift.py'
      - 'src/main.rs'
      - 'src/wsclient.rs'
      - '.github/workflows/spec-drift.yml'
  push:
    branches: [main]
    paths:
      - '.api-version'
      - 'endpoints.txt'
      - 'scripts/check_spec_drift.py'
      - 'src/main.rs'
      - 'src/wsclient.rs'

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read pinned spec version
        id: pin
        # ⚠️ TEMPORARY — ENG-4949, blocked on ENG-4943 (nexus-xyz/nexus-exchange-api#41).
        # The /api/v1 spec is not released yet, so the tag pinned in .api-version
        # (v0.6.1) does not exist on the remote. Until #41 merges and that tag is
        # cut, this step overrides the fetch ref to the ENG-4943 PR branch so CI
        # validates against the /api/v1 spec. TODO(ENG-4949) RESTORE when #41 lands:
        #   1. delete SPEC_BRANCH_OVERRIDE below (the fetch then falls back to the
        #      validated tag from .api-version);
        #   2. confirm .api-version matches the actual cut tag (expected v0.6.1);
        #   3. re-enable caching (see the Cache/Fetch steps below).
        env:
          SPEC_BRANCH_OVERRIDE: lucascampos/eng-4943-nexus-exchange-api-add-apiv1-routes-to-openapi-spec-cut
        run: |
          tag="$(cat .api-version)"
          # Validate before it reaches any URL / cache key: a crafted
          # .api-version on a fork PR could otherwise inject into the fetch.
          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+)*$ ]]; then
            echo "::error::.api-version must look like vX.Y.Z (got: '$tag')"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          if [[ -n "$SPEC_BRANCH_OVERRIDE" ]]; then
            # A branch ref is mutable, so its content is NOT safe to cache under a
            # stable key: signal a branch pin so the cache is skipped and the spec
            # is fetched fresh every run. The ref is a hardcoded constant here
            # (workflow code, not attacker-supplied data), so it carries no
            # injection risk the .api-version tag validation would otherwise guard.
            echo "ref=$SPEC_BRANCH_OVERRIDE" >> "$GITHUB_OUTPUT"
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
            echo "::warning::spec-drift is pinned to the ENG-4943 PR branch, not a release tag (ENG-4949; restore on merge)"
          else
            echo "ref=$tag" >> "$GITHUB_OUTPUT"
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache the pinned spec
        id: cache
        # Only a release tag is immutable enough to cache; skipped while pinned to
        # a branch (TODO(ENG-4949): drops to always-on once the override is gone).
        if: steps.pin.outputs.is_tag == 'true'
        uses: actions/cache@v4
        with:
          path: openapi.pinned.json
          key: spec-${{ steps.pin.outputs.tag }}

      - name: Fetch spec (cache miss, or always while branch-pinned)
        if: steps.pin.outputs.is_tag != 'true' || steps.cache.outputs.cache-hit != 'true'
        env:
          # Passed via env (not interpolated into the script) so the ref is
          # data, not code. For a tag it is validated to ^v[0-9.]+$ above; for the
          # temporary branch pin it is a fixed constant in this workflow.
          SPEC_REF: ${{ steps.pin.outputs.ref }}
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/nexus-xyz/nexus-exchange-api/${SPEC_REF}/openapi.json" \
            -o openapi.pinned.json

      - name: Check drift
        run: python3 scripts/check_spec_drift.py openapi.pinned.json

      - name: Publish coverage to the step summary
        if: always()
        run: |
          # Re-run for a clean, parseable line; the gate above is the source of
          # truth for pass/fail. The "X of Y (Z% coverage)" line is what the
          # dashboard scrapes for the CLI API-coverage panel.
          line="$(python3 scripts/check_spec_drift.py openapi.pinned.json \
            | grep -E 'CLI targets [0-9]+ of [0-9]+' || true)"
          {
            echo "### CLI API coverage"
            echo ""
            echo "${line:-coverage line unavailable}"
          } >> "$GITHUB_STEP_SUMMARY"
