[package]
name = "nexus-exchange-cli"
version = "0.1.0"
edition = "2021"
rust-version = "1.82"
description = "Command-line interface for the Nexus Exchange API"
license = "MIT OR Apache-2.0"
repository = "https://github.com/nexus-xyz/nexus-exchange-cli"
keywords = ["nexus", "exchange", "trading", "crypto", "cli"]
categories = ["command-line-utilities"]
publish = false

[[bin]]
name = "nexus"
path = "src/main.rs"

[dependencies]
# The Nexus Exchange SDK. The crate is not yet on crates.io (it ships with
# `publish = false`), so we depend on it from git, pinned to `main`. Swap this
# for a `version = "x.y"` line once the SDK is published.
nexus-exchange = { git = "https://github.com/nexus-xyz/nexus-exchange-rs", branch = "main" }

anyhow = "1"
clap = { version = "4", features = ["derive", "env"] }
clap_complete = "4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal"] }

# The SDK is still a skeleton (no auth/ws, REST `get` is crate-private), so the
# CLI carries its own signed HTTP client and WebSocket transport. These mirror
# the SDK's own stack (reqwest + rustls, tokio-tungstenite) so they can fold
# back into the SDK once it grows the endpoints.
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"
rpassword = "7"
futures-util = { version = "0.3", default-features = false, features = ["std", "sink"] }
tokio-tungstenite = { version = "0.27", default-features = false, features = ["connect", "rustls-tls-webpki-roots"] }
